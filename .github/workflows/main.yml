name: Test Configuration and Scraper

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r scraper/requirements.txt

    - name: Create .env file for testing
      run: |
        echo "GOOGLE_SHEETS_ID=${{ secrets.GOOGLE_SHEETS_ID }}" > .env
        echo "GOOGLE_SERVICE_ACCOUNT_JSON=service_account.json" >> .env
        echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

    - name: Run configuration test
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: |
        # On définit la clé dans l'env pour que config_manager puisse l'utiliser si besoin
        # bien que config_manager lise normalement depuis le Sheet
        python test_config.py
