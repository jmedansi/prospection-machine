    <div id="modal-edit-lead" class="modal-overlay">
        <div class="modal-content">
            <div class="mh">
                <div class="mh-t">Modifier Prospect</div>
                <button class="btn bg0" onclick="closeModal('modal-edit-lead')">✕</button>
            </div>
            <div class="mb">
                <input type="hidden" id="edit-lead-id">
                <div class="form-grp">
                    <label>Nom de l'entreprise</label>
                    <input type="text" id="edit-lead-nom" class="inp">
                </div>
                <div class="g2">
                    <div class="form-grp">
                        <label>Ville</label>
                        <input type="text" id="edit-lead-ville" class="inp">
                    </div>
                    <div class="form-grp">
                        <label>Secteur</label>
                        <input type="text" id="edit-lead-sector" class="inp">
                    </div>
                </div>
                <div class="g2">
                    <div class="form-grp">
                        <label>Email</label>
                        <input type="email" id="edit-lead-email" class="inp">
                    </div>
                    <div class="form-grp">
                        <label>Téléphone</label>
                        <input type="text" id="edit-lead-tel" class="inp">
                    </div>
                </div>
                <div class="g2">
                    <div class="form-grp">
                        <label>Email 2</label>
                        <input type="email" id="edit-lead-email-2" class="inp" placeholder="Optionnel">
                    </div>
                    <div class="form-grp">
                        <label>Téléphone 2</label>
                        <input type="text" id="edit-lead-tel-2" class="inp" placeholder="Optionnel">
                    </div>
                </div>
                <div class="form-grp">
                    <label>Site Web</label>
                    <input type="url" id="edit-lead-site" class="inp">
                </div>
            </div>
            <div class="mf">
                <button class="btn" style="background:rgba(239,68,68,0.1);color:var(--red)" onclick="deleteLead()">Supprimer</button>
                <div style="display:flex;gap:10px">
                    <button class="btn bg2" onclick="closeModal('modal-edit-lead')">Annuler</button>
                    <button class="btn bg1" onclick="saveLead()">Sauvegarder</button>
                </div>
            </div>
        </div>
    </div>
