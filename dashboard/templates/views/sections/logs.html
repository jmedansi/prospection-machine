<!-- Tab: Logs -->
<div class="card" style="display:flex;flex-direction:column;height:calc(100vh - 250px);padding:0;overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface2)">
        <div style="font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;">Logs Système (200 dernières lignes)</div>
        <div style="display:flex;gap:8px">
            <span id="log-stats" style="font-size:11px;color:var(--ink3);margin-top:4px"></span>
            <button class="btn bp1 sm" style="padding:2px 10px;font-size:11px" onclick="loadLogs()">Rafraîchir</button>
        </div>
    </div>
    <textarea id="log-viewer" readonly style="flex:1;width:100%;background:#0f172a;color:#94a3b8;font-family:'Cascadia Code', 'Courier New', monospace;font-size:11px;line-height:1.4;padding:16px;border:none;resize:none;margin:0"></textarea>
</div>
