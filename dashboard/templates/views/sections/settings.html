<div class="section-tabs">
    <button class="section-tab active" onclick="switchSectionTab('setting_profil', this)">Profil</button>
    <button class="section-tab" onclick="switchSectionTab('setting_api', this)">Connexions</button>
    <button class="section-tab" onclick="switchSectionTab('setting_system', this)">Système</button>
</div>

<!-- Tab: Profil -->
<div id="subtab-setting_profil" class="subtab-content active">
    <div class="card">
        <div class="ct2" style="margin-bottom:1rem">Identité expéditeur</div>
        <div class="fg">
            <div class="fgr"><label class="fl">Nom complet</label><input type="text" id="setting-name" value="Jean-Marc DANSI"></div>
            <div class="fgr"><label class="fl">Email</label><input type="text" id="setting-email" value="jmedansi@incidenx.com"></div>
        </div>
        <div class="fgr" style="margin-top:1rem">
            <label class="fl">Signature Email (HTML)</label>
            <textarea id="setting-sig" style="height:100px" placeholder="Cordialement,<br>Jean-Marc"></textarea>
        </div>
        <button class="btn bp1 sm" style="margin-top:.875rem" id="btn-save-identity" onclick="saveIdentity()">Sauvegarder l'identité</button>
    </div>
</div>

<!-- Tab: Connexions -->
<div id="subtab-setting_api" class="subtab-content" style="display:none">
    <div class="card">
        <div class="ct2" style="margin-bottom:1rem">Clés API & Services</div>
        <div class="fg">
            <div class="fgr"><label class="fl">Brevo API Key</label><input type="password" id="set-brevo-key" placeholder="xkeysib-..."></div>
            <div class="fgr"><label class="fl">Groq API Key</label><input type="password" id="set-groq-key" placeholder="gsk_..."></div>
            <div class="fgr"><label class="fl">Hunter API Key</label><input type="password" id="set-hunter-key" placeholder="Hunter.io key"></div>
            <div class="fgr"><label class="fl">Google Sheet ID</label><input type="text" id="set-sheet-id" placeholder="ID de la feuille"></div>
        </div>
        <div style="display:flex;gap:10px;margin-top:.875rem">
            <button class="btn bg1 sm" onclick="testConnections()">Tester les connexions</button>
            <button class="btn bp1 sm" onclick="saveSettings()">Sauvegarder les clés</button>
        </div>
    </div>
</div>

<!-- Tab: Système -->
<div id="subtab-setting_system" class="subtab-content" style="display:none">
    <div class="card">
        <div class="ct2" style="margin-bottom:1rem;color:var(--red)">Danger Zone</div>
        <p style="font-size:12px;color:var(--ink3);margin-bottom:1rem">Attention : ces actions sont irréversibles.</p>
        <button class="btn bd" onclick="resetAllData()">Réinitialiser toutes les données</button>
    </div>
</div>
